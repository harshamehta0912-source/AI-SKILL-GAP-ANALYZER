<!DOCTYPE html>
<html>

<head>

<title>AI Skill Gap Analyzer</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>🤖 AI Skill Gap Analyzer</h1>

<p>Manufacturing Employee Skill Assessment</p>

<form action="/analyze" method="POST">

<input
type="text"
name="name"
placeholder="Employee Name"
required>


<select name="role">

<option>Data Analyst</option>
<option>Production Engineer</option>
<option>Quality Engineer</option>
<option>Maintenance Engineer</option>
<option>Manufacturing Engineer</option>
<option>Process Engineer</option>
<option>Industrial Engineer</option>
<option>Machine Operator</option>
<option>CNC Operator</option>
<option>Safety Officer</option>

</select>

<input
type="text"
name="skills"
placeholder="Example: python, sql"
required>

<br><br>

<button type="submit">
Analyze Skills
</button>

</form>

</div>

</body>
</html>
